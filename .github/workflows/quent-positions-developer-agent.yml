name: Quent Positions Developer Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  quent-positions-developer:
    if: github.event.action == 'labeled' && github.event.label.name == 'quent_positions_developer_delegated'
    runs-on: [self-hosted, quent_positions_developer_delegated]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make Node 20 visible to sudo and runner user
        run: |
          sudo ln -sf /opt/hostedtoolcache/node/20.20.2/x64/bin/node /usr/local/bin/node
          sudo ln -sf /opt/hostedtoolcache/node/20.20.2/x64/bin/npm /usr/local/bin/npm
          sudo ln -sf /opt/hostedtoolcache/node/20.20.2/x64/bin/npx /usr/local/bin/npx
          hash -r
          sudo -u runner -- node -v

      - name: Prepare clean Codex home and temp agent folder
        run: |
          rm -rf "$RUNNER_TEMP/codex-home"
          mkdir -p "$RUNNER_TEMP/codex-home"
          chown -R runner:runner "$RUNNER_TEMP/codex-home"

          rm -rf "$RUNNER_TEMP/agent"
          mkdir -p "$RUNNER_TEMP/agent"

          rm -f /home/runner/.codex/config.toml || true
          mkdir -p /home/runner/.codex
          chown -R runner:runner /home/runner/.codex

      - name: Build full issue context for Codex
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          PROMPT_FILE="$RUNNER_TEMP/agent/issue-${ISSUE_NUMBER}-quent-positions-developer.md"

          cat > "$PROMPT_FILE" <<'EOF'
          You are working in the mayberryjp/quant_positions repository.

          You are the Quent Positions Developer agent.

          Mission:
          - Design and implement Python software work for the quant_positions repository.
          - Focus on position tracking, portfolio position state, database/API integration, reconciliation logic, typing, tests, CLI/service entrypoints, and documentation when appropriate.
          - Do not hard-code API keys or secrets.
          - Use environment variables or the existing repository config pattern for credentials.
          - Keep software work cleanly separated from unrelated infrastructure setup unless the issue explicitly asks for cross-area work.

          Repository expectations:
          - Inspect the repository before making changes.
          - Make source/config/documentation changes unless the requested work is already implemented.
          - Do not only summarize the issue.
          - Do not stop after analysis.
          - If no change is needed, explain exactly which existing files already implement the behavior.
          - Make the smallest reasonable change.
          - Do not edit unrelated files.
          - Do not change secrets, credentials, workflow permissions, runner config, or GitHub Actions unless the issue explicitly asks for workflow changes.
          - Do not hard-code API keys, passwords, tokens, or connection strings with secrets.
          - Run relevant tests or validation if available.
          - Leave the repo in a commit-ready state.

          Software guidance:
          - Prefer small, testable Python modules.
          - Follow the repository's existing persistence, API, config, and test patterns.
          - Keep position models clear, explicit, and auditable.
          - Handle partial failures and invalid data explicitly.
          - Preserve raw provider or upstream identity where useful for debugging and traceability.
          - Update .env.example when adding new required configuration.

          Documentation requirement:
          - Document software design, configuration, and code changes in the repo.
          - Prefer an existing docs location if one exists.
          - If no suitable docs location exists, create or update docs/codex/quent-positions-developer.md.
          - Documentation must be based only on verified repository changes. Do not invent behavior.

          Required final artifact:
          - Before finishing, create or update .agent/change-summaries/issue-${{ github.event.issue.number }}-quent-positions-developer.md.
          - This file is required even if no code changes were made.
          - Base it only on verified repository changes. Do not invent behavior.
          - Use exactly this format:

          ## Agent Change Summary

          ### Agent
          - Quent Positions Developer

          ### GitHub issue
          - #${{ github.event.issue.number }}

          ### What changed
          - ...

          ### Software design impact
          - ...

          ### Positions / portfolio impact
          - ...

          ### Configuration impact
          - ...

          ### Code impact
          - ...

          ### Files changed
          - ...

          ### Documentation impact
          - ...

          ### Testing / validation
          - ...

          ### Open questions
          - ...

          Definition of done:
          - The requested quant_positions work is implemented or clearly proven already implemented.
          - Relevant validation passes, or you clearly document why validation could not be run.
          - Software design/config/code changes are documented in the repo.
          - .agent/change-summaries/issue-${{ github.event.issue.number }}-quent-positions-developer.md exists and follows the required format.
          - The change is ready for human review.

          Full GitHub issue context follows.

          EOF

          gh issue view "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --json number,title,body,author,comments,labels,url \
            --jq '
              "# GitHub Issue #" + (.number|tostring) + "\n\n" +
              "URL: " + .url + "\n\n" +
              "Title: " + .title + "\n\n" +
              "Labels: " + ([.labels[].name] | join(", ")) + "\n\n" +
              "Author: @" + .author.login + "\n\n" +
              "## Original Issue Body\n\n" +
              (.body // "") + "\n\n" +
              "## Issue Comments / Conversation\n\n" +
              (
                if (.comments | length) == 0 then
                  "_No comments yet._\n"
                else
                  (
                    .comments
                    | sort_by(.createdAt)
                    | map(
                        "### Comment by @" + .author.login + " at " + .createdAt + "\n\n" +
                        (.body // "") + "\n"
                      )
                    | join("\n---\n\n")
                  )
                end
              )
            ' >> "$PROMPT_FILE"

          echo "Built full issue context:"
          sed -n '1,260p' "$PROMPT_FILE"

      - name: Verify OpenAI API key secret
        env:
          OPENAI_API_KEY_CHECK: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY_CHECK" ]; then
            echo "OPENAI_API_KEY is empty or unavailable"
            exit 1
          fi

          echo "OPENAI_API_KEY is present"
          echo "Length: ${#OPENAI_API_KEY_CHECK}"
          echo "Prefix: $(printf '%s' "$OPENAI_API_KEY_CHECK" | cut -c1-7)"

      - name: Run Codex positions developer
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ runner.temp }}/agent/issue-${{ github.event.issue.number }}-quent-positions-developer.md
          output-file: ${{ runner.temp }}/agent/codex-output-${{ github.event.issue.number }}-quent-positions-developer.md
          codex-home: ${{ runner.temp }}/codex-home
          safety-strategy: unsafe
          codex-user: runner
          sandbox: danger-full-access

      - name: Verify agent change summary
        if: always()
        run: |
          mkdir -p .agent/change-summaries

          SUMMARY_FILE=".agent/change-summaries/issue-${{ github.event.issue.number }}-quent-positions-developer.md"

          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "Codex did not create $SUMMARY_FILE. Creating fallback summary."

            {
              echo "## Agent Change Summary"
              echo
              echo "### Agent"
              echo "- Quent Positions Developer"
              echo
              echo "### GitHub issue"
              echo "- #${{ github.event.issue.number }}"
              echo
              echo "### What changed"
              echo "- No structured change summary was produced by the positions developer agent."
              echo
              echo "### Software design impact"
              echo "- Unknown. Review the PR diff."
              echo
              echo "### Positions / portfolio impact"
              echo "- Unknown. Review the PR diff."
              echo
              echo "### Configuration impact"
              echo "- Unknown. Review the PR diff."
              echo
              echo "### Code impact"
              echo "- Unknown. Review the PR diff."
              echo
              echo "### Files changed"
              echo "- Unknown. Review the PR diff."
              echo
              echo "### Documentation impact"
              echo "- Unknown. A human reviewer should inspect the changes."
              echo
              echo "### Testing / validation"
              echo "- Unknown. Review Codex output and workflow logs."
              echo
              echo "### Open questions"
              echo "- The positions developer agent did not create the required summary file."
            } > "$SUMMARY_FILE"
          fi

          echo "=== Agent change summary ==="
          cat "$SUMMARY_FILE"

      - name: Show Codex output and git status
        if: always()
        run: |
          echo "=== Codex output ==="

          OUTPUT_FILE="$RUNNER_TEMP/agent/codex-output-${{ github.event.issue.number }}-quent-positions-developer.md"

          if [ -f "$OUTPUT_FILE" ]; then
            cat "$OUTPUT_FILE"
          else
            echo "No Codex output found"
          fi

          echo
          echo "=== Git status ==="
          git status --short

          echo
          echo "=== Git diff summary ==="
          git diff --stat || true

      - name: Refuse PR if sensitive files changed
        shell: bash
        run: |
          CHANGED="$(git diff --name-only)"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -E '(^|/)(\.env|\.env\.(local|production|prod|staging|dev|development|test)|.*secret.*|.*credential.*|.*token.*)$'; then
            echo "Refusing PR because sensitive files were changed."
            exit 1
          fi

      - name: Run basic validation
        run: |
          set -e

          if [ -f package.json ]; then
            echo "Detected package.json"
            npm install
            npm test --if-present
          fi

          if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
            echo "Detected Python project"
            python3 -m compileall .
          fi

          if find . -type f -name 'test_*.py' | grep -q .; then
            if python3 -c 'import pytest' >/dev/null 2>&1; then
              echo "Detected Python tests and pytest is available"
              python3 -m pytest
            else
              echo "Detected Python tests but pytest is not installed; skipping pytest."
            fi
          fi

      - name: Create branch and PR if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes made by agent."
            exit 0
          fi

          BRANCH="quent-positions-developer/issue-${{ github.event.issue.number }}-${{ github.run_id }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          git add -A \
            ':!.agent/issue.md' \
            ':!.agent/codex-output.md' \
            ':!.agent/pr-body.md'

          if git diff --cached --quiet; then
            echo "Only ignored/generated files changed. No PR needed."
            exit 0
          fi

          git commit -m "Quent positions developer work for issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH"

          SUMMARY_FILE=".agent/change-summaries/issue-${{ github.event.issue.number }}-quent-positions-developer.md"
          OUTPUT_FILE="$RUNNER_TEMP/agent/codex-output-${{ github.event.issue.number }}-quent-positions-developer.md"
          PR_BODY="$RUNNER_TEMP/agent/pr-body-${{ github.event.issue.number }}-quent-positions-developer.md"

          {
            echo "## Codex Output"
            echo

            if [ -f "$OUTPUT_FILE" ]; then
              cat "$OUTPUT_FILE"
            else
              echo "No Codex output file was produced."
            fi

            echo
            echo "---"
            echo
            echo "## Agent Change Summary"
            echo

            if [ -f "$SUMMARY_FILE" ]; then
              cat "$SUMMARY_FILE"
            else
              echo "No agent change summary was produced."
            fi
          } > "$PR_BODY"

          gh pr create \
            --title "Quent positions developer work for issue #${{ github.event.issue.number }}" \
            --body-file "$PR_BODY" \
            --base main \
            --head "$BRANCH"
