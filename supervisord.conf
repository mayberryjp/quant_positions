[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:alembic-migrate]
command=alembic upgrade head
directory=/app
autostart=true
autorestart=false
startsecs=0
exitcodes=0
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"

[program:quant-positions-api]
command=bash -c "sleep 5 && exec python3 -m quant_positions.api.app"
directory=/app
autostart=true
autorestart=true
startretries=999
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"

[program:reconciliation-worker]
command=bash -c "sleep 5 && exec python3 -m quant_positions.workers.reconciliation --schedule %(ENV_RECONCILIATION_INTERVAL)s"
directory=/app
autostart=true
autorestart=true
startretries=999
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"
