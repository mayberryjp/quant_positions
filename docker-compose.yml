services:
  quant_positions:
    image: quant_positions:latest
    container_name: quant_positions
    stdin_open: true
    tty: true
    environment:
      - DATABASE_URL=postgresql+psycopg://quant:quant_dev_password@postgres:5432/quant
      - API_PORT=8001
      - RECONCILIATION_INTERVAL=300
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: quant_positions_postgres
    environment:
      POSTGRES_DB: quant
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
